name: Generate House Coverage & Deploy (Manual)

on:
  workflow_dispatch:
    inputs:
      place:
        description: 'Dorp waarvoor de data wordt gegenereerd'
        required: true
        type: choice
        default: warmenhuizen
        options:
          - warmenhuizen
          - tuitjenhorn
      include_route_geometries:
        description: 'Prefetch and store route geometries'
        type: boolean
        default: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # nodig om volledige git geschiedenis te hebben voor diff
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Generate house coverage
        env:
          PLACE_ID: ${{ inputs.place }}
        run: |
          args=(--place="$PLACE_ID")
          if [ "${{ inputs.include_route_geometries }}" = "true" ]; then
            args+=(--include-route-geometries)
          fi
          node scripts/generate-house-coverage.mjs "${args[@]}"

      - name: Generate split browser data
        run: npm run generate:coverage-split

      - name: Check for changes
        id: git-check
        env:
          PLACE_ID: ${{ inputs.place }}
        run: |
          changed_files="$(git status --porcelain -- \
            "data/places/${PLACE_ID}/house-coverage.json" \
            "data/places/${PLACE_ID}/coverage-summary.json" \
            "data/places/${PLACE_ID}/house-map.json" \
            "data/places/${PLACE_ID}/address-index.compact.json" \
            "data/places/${PLACE_ID}/house-details")"
          if [ -z "$changed_files" ]; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated data
        if: steps.git-check.outputs.no_changes == 'false'
        env:
          PLACE_ID: ${{ inputs.place }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add "data/places/${PLACE_ID}/house-coverage.json"
          git add "data/places/${PLACE_ID}/coverage-summary.json"
          git add "data/places/${PLACE_ID}/house-map.json"
          git add "data/places/${PLACE_ID}/address-index.compact.json"
          git add "data/places/${PLACE_ID}/house-details"
          git commit -m "Auto-generated ${PLACE_ID} house coverage on ${{ github.sha }}"
          # Push met PAT uit secrets
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/TheBeems/afvalcontainers.git HEAD:main

      - name: Build site
        if: steps.git-check.outputs.no_changes == 'false'
        run: npm run build

      - name: Deploy to GitHub Pages
        if: steps.git-check.outputs.no_changes == 'false'
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_dir: ./dist
