name: Generate House Coverage & Deploy (Manual)

on:
  workflow_dispatch:
    inputs:
      include_route_geometries:
        description: 'Prefetch and store route geometries'
        type: boolean
        default: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # nodig om volledige git geschiedenis te hebben voor diff
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Generate house coverage
        run: |
          args=()
          if [ "${{ inputs.include_route_geometries }}" = "true" ]; then
            args+=(--include-route-geometries)
          fi
          node scripts/generate-house-coverage.mjs "${args[@]}"

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet data/house-coverage.json; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated data
        if: steps.git-check.outputs.no_changes == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/house-coverage.json
          git commit -m "Auto-generated house coverage on ${{ github.sha }}"
          # Push met PAT uit secrets
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/TheBeems/afvalcontainers.git HEAD:main

      - name: Build site
        if: steps.git-check.outputs.no_changes == 'false'
        run: npm run build

      - name: Deploy to GitHub Pages
        if: steps.git-check.outputs.no_changes == 'false'
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_dir: ./dist
